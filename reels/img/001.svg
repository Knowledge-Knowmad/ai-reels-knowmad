<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#64b5f6" stroke-width="0.5">
    <line x1="0" y1="80" x2="360" y2="80"/><line x1="0" y1="160" x2="360" y2="160"/>
    <line x1="0" y1="240" x2="360" y2="240"/><line x1="0" y1="320" x2="360" y2="320"/>
    <line x1="0" y1="400" x2="360" y2="400"/><line x1="0" y1="480" x2="360" y2="480"/>
    <line x1="0" y1="560" x2="360" y2="560"/>
    <line x1="60" y1="0" x2="60" y2="640"/><line x1="120" y1="0" x2="120" y2="640"/>
    <line x1="180" y1="0" x2="180" y2="640"/><line x1="240" y1="0" x2="240" y2="640"/>
    <line x1="300" y1="0" x2="300" y2="640"/>
  </g>

  <!-- Episode badge -->
  <rect x="24" y="28" width="56" height="28" rx="6" fill="rgba(66,165,245,0.15)"/>
  <text x="52" y="47" text-anchor="middle" fill="#64b5f6" font-family="sans-serif" font-size="13" font-weight="700">EP.01</text>

  <!-- Title -->
  <text x="180" y="200" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="800">生成式 AI</text>
  <text x="180" y="240" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="800">不是搜尋引擎</text>

  <!-- Divider -->
  <line x1="140" y1="270" x2="220" y2="270" stroke="#42a5f5" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="180" y="310" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="15">別再把 ChatGPT 當 Google 了</text>

  <!-- VS icon -->
  <circle cx="120" cy="420" r="40" fill="rgba(66,165,245,0.1)" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="120" y="413" text-anchor="middle" fill="#64b5f6" font-family="sans-serif" font-size="11">Search</text>
  <text x="120" y="432" text-anchor="middle" fill="#64b5f6" font-family="sans-serif" font-size="18">🔍</text>

  <text x="180" y="425" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="16" font-weight="700">VS</text>

  <circle cx="240" cy="420" r="40" fill="rgba(66,165,245,0.1)" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="240" y="413" text-anchor="middle" fill="#64b5f6" font-family="sans-serif" font-size="11">Gen AI</text>
  <text x="240" y="432" text-anchor="middle" fill="#64b5f6" font-family="sans-serif" font-size="18">🤖</text>

  <!-- Bottom brand -->
  <text x="180" y="590" text-anchor="middle" fill="#475569" font-family="sans-serif" font-size="12">知識遊牧 KNOWMAD</text>
  <line x1="80" y1="605" x2="280" y2="605" stroke="#1e2d4a" stroke-width="1"/>
</svg>
