<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Reels — 知識遊牧 Knowmad</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Noto Sans TC", "Helvetica Neue", sans-serif;
      background: #0f1729;
      color: #e2e8f0;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: #1a2744;
      border-bottom: 1px solid #2a3a5c;
      backdrop-filter: blur(12px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .logo img { width: 30px; height: 30px; border-radius: 6px; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: .9rem;
      transition: color .2s;
    }
    .nav-links a:hover { color: #fff; }
    .reel-count {
      background: #2a3a5c;
      color: #64b5f6;
      font-size: .75rem;
      padding: .15rem .5rem;
      border-radius: 999px;
      margin-left: .3rem;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      background: linear-gradient(180deg, #1a2744 0%, #0f1729 100%);
    }
    .hero-badge {
      display: inline-block;
      font-size: .8rem;
      padding: .3rem .8rem;
      border-radius: 999px;
      background: rgba(100,181,246,.1);
      color: #64b5f6;
      border: 1px solid rgba(100,181,246,.2);
      margin-bottom: 1.2rem;
    }
    .hero h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: .6rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #64b5f6, #42a5f5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.05rem;
      color: #94a3b8;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Reels Feed ── */
    .feed {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }
    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .feed-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #cbd5e1;
      border-left: 3px solid #42a5f5;
      padding-left: .8rem;
    }
    .feed-filter {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #1e2d4a;
      color: #94a3b8;
      border: 1px solid #2a3a5c;
      padding: .3rem .7rem;
      border-radius: 999px;
      font-size: .78rem;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #2a3a5c;
      color: #64b5f6;
      border-color: #42a5f5;
    }

    /* ── Reel Card ── */
    .reel-card {
      background: #1a2744;
      border: 1px solid #2a3a5c;
      border-radius: 16px;
      margin-bottom: 2rem;
      overflow: hidden;
      transition: box-shadow .3s;
    }
    .reel-card:hover {
      box-shadow: 0 4px 24px rgba(66,165,245,.12);
    }

    /* Card header */
    .reel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #2a3a5c;
    }
    .reel-number {
      font-size: .85rem;
      font-weight: 700;
      color: #42a5f5;
      background: rgba(66,165,245,.1);
      padding: .2rem .6rem;
      border-radius: 6px;
    }
    .reel-date {
      font-size: .78rem;
      color: #64748b;
    }

    /* Video embed area */
    .reel-video {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      max-height: 520px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    .reel-video iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .play-btn {
      width: 64px;
      height: 64px;
      background: rgba(66,165,245,.2);
      border: 2px solid rgba(66,165,245,.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .3s;
    }
    .play-btn:hover {
      background: rgba(66,165,245,.35);
      transform: scale(1.1);
    }
    .play-btn::after {
      content: "";
      display: block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 12px 0 12px 22px;
      border-color: transparent transparent transparent #64b5f6;
      margin-left: 4px;
    }
    .platform-badge {
      position: absolute;
      top: .8rem;
      right: .8rem;
      background: rgba(26,39,68,.85);
      color: #94a3b8;
      font-size: .72rem;
      padding: .25rem .6rem;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    /* Card title & tags */
    .reel-title-bar {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #2a3a5c;
    }
    .reel-title-bar h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: .5rem;
    }
    .tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      display: inline-block;
      font-size: .72rem;
      padding: .2rem .55rem;
      border-radius: 999px;
      background: rgba(100,181,246,.1);
      color: #64b5f6;
      border: 1px solid rgba(100,181,246,.15);
    }

    /* Extended learning (collapsible) */
    .reel-learn {
      padding: 0 1.2rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s ease, padding .4s ease;
    }
    .reel-learn.open {
      max-height: 2000px;
      padding: 1.2rem;
    }
    .reel-learn h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e8f0;
      margin: 1.2rem 0 .5rem;
    }
    .reel-learn h3:first-child { margin-top: 0; }
    .reel-learn p, .reel-learn li {
      font-size: .92rem;
      color: #94a3b8;
      line-height: 1.8;
    }
    .reel-learn ul, .reel-learn ol {
      padding-left: 1.2rem;
      margin: .3rem 0;
    }
    .reel-learn a {
      color: #64b5f6;
      text-decoration: none;
    }
    .reel-learn a:hover { text-decoration: underline; }
    .reel-learn table {
      width: 100%;
      border-collapse: collapse;
      margin: .6rem 0;
      font-size: .85rem;
    }
    .reel-learn th {
      background: #1e2d4a;
      color: #cbd5e1;
      text-align: left;
      padding: .5rem .7rem;
      border: 1px solid #2a3a5c;
    }
    .reel-learn td {
      padding: .5rem .7rem;
      border: 1px solid #2a3a5c;
      color: #94a3b8;
    }
    .reel-learn blockquote {
      border-left: 3px solid #42a5f5;
      padding-left: .8rem;
      margin: .6rem 0;
      color: #94a3b8;
      font-style: italic;
    }

    /* Toggle button */
    .toggle-learn {
      width: 100%;
      padding: .8rem 1.2rem;
      background: none;
      border: none;
      border-top: 1px solid #2a3a5c;
      color: #64b5f6;
      font-size: .88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      transition: background .2s;
    }
    .toggle-learn:hover { background: rgba(66,165,245,.05); }
    .toggle-learn .arrow {
      transition: transform .3s;
      display: inline-block;
    }
    .toggle-learn.open .arrow { transform: rotate(180deg); }

    /* ── Progress bar ── */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #1e2d4a;
      z-index: 100;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #42a5f5, #64b5f6);
      width: 0%;
      transition: width .3s;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2.5rem 1rem;
      font-size: .8rem;
      color: #475569;
      border-top: 1px solid #1e2d4a;
    }
    footer a { color: #64b5f6; text-decoration: none; }

    /* ── RWD ── */
    @media (max-width: 600px) {
      header { padding: .8rem 1rem; }
      .hero { padding: 2.5rem 1rem 2rem; }
      .hero h1 { font-size: 1.7rem; }
      .feed { padding: 0 1rem 3rem; }
      .reel-video { max-height: 400px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">
      <img src="favicon.svg" alt="AI Reels">
      知識遊牧 AI Reels
    </a>
    <nav class="nav-links">
      <a href="#feed">所有 Reels <span class="reel-count" id="count">0</span></a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-badge">Knowledge Knowmad</div>
    <h1>AI <span>Reels</span> Collection</h1>
    <p>每支短影音都搭配延伸學習文檔，讓你不只看過，更能學到。<br>貫徹長期主義，持續累積 AI 思維。</p>
  </section>

  <section class="feed" id="feed">
    <div class="feed-header">
      <h2 class="feed-title">所有 Reels</h2>
      <div class="feed-filter" id="filters"></div>
    </div>
    <div id="reel-list"></div>
  </section>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <footer>
    &copy; 2026 <a href="/">知識遊牧 Knowmad</a> — 持續學習，持續成長
  </footer>

  <script>
    /* ── Reel index: 新增影片只需在此加入編號 ── */
    const REEL_IDS = ['001', '002', '003'];

    /* ── Simple Markdown → HTML ── */
    function md(text) {
      let html = text
        // headings
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        // table (simple)
        .replace(/^\|(.+)\|$/gm, (match) => {
          const cells = match.split('|').filter(c => c.trim());
          if (cells.every(c => /^[\s\-:]+$/.test(c))) return '<!--sep-->';
          return cells.map(c => `<td>${c.trim()}</td>`).join('');
        })
        // bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        // unordered list
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        // ordered list
        .replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>')
        // paragraphs
        .replace(/\n\n/g, '</p><p>')
        // line breaks
        .replace(/\n/g, '<br>');

      // wrap consecutive <li> in <ul>
      html = html.replace(/((<li>.*?<\/li><br>?)+)/g, (m) => {
        return '<ul>' + m.replace(/<br>/g, '') + '</ul>';
      });

      // wrap table rows
      html = html.replace(/((<td>.*?<\/td>)+)/g, '<tr>$1</tr>');
      if (html.includes('<tr>')) {
        html = html.replace(/<!--sep--><br>?/g, '');
        html = html.replace(/((<tr>.*?<\/tr>)+)/g, (m) => {
          const rows = m.match(/<tr>.*?<\/tr>/g);
          if (rows && rows.length > 0) {
            rows[0] = rows[0].replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>');
            return '<table>' + rows.join('') + '</table>';
          }
          return '<table>' + m + '</table>';
        });
      }

      return html;
    }

    /* ── Parse YAML-like frontmatter ── */
    function parseFront(raw) {
      const match = raw.match(/^---\n([\s\S]+?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: raw };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const m = line.match(/^(\w+):\s*(.+)$/);
        if (m) {
          let val = m[2].trim();
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(s => s.trim());
          }
          meta[m[1]] = val;
        }
      });
      return { meta, body: match[2] };
    }

    /* ── Render all reels ── */
    async function loadReels() {
      const list = document.getElementById('reel-list');
      const allTags = new Set();
      let loaded = 0;

      for (const id of REEL_IDS) {
        try {
          const res = await fetch(`reels/${id}.md`);
          if (!res.ok) continue;
          const raw = await res.text();
          const { meta, body } = parseFront(raw);
          loaded++;

          if (Array.isArray(meta.tags)) meta.tags.forEach(t => allTags.add(t));

          const card = document.createElement('div');
          card.className = 'reel-card';
          card.dataset.tags = (meta.tags || []).join(',');

          card.innerHTML = `
            <div class="reel-header">
              <span class="reel-number">#${id}</span>
              <span class="reel-date">${meta.date || ''}</span>
            </div>
            <a class="reel-video" href="${meta.video || '#'}" target="_blank" title="前往觀看影片">
              <div class="play-btn"></div>
              ${meta.platform ? `<span class="platform-badge">${meta.platform}</span>` : ''}
            </a>
            <div class="reel-title-bar">
              <h2>${meta.title || '未命名'}</h2>
              <div class="tags">
                ${(meta.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
            </div>
            <div class="reel-learn" id="learn-${id}">
              ${md(body)}
            </div>
            <button class="toggle-learn" onclick="toggleLearn('${id}', this)">
              延伸學習 <span class="arrow">&#9660;</span>
            </button>
          `;
          list.appendChild(card);
        } catch (e) {
          console.warn(`Failed to load reel ${id}`, e);
        }
      }

      document.getElementById('count').textContent = loaded;

      // Build filter buttons
      const filters = document.getElementById('filters');
      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = tag;
        btn.onclick = () => filterByTag(tag, btn);
        filters.appendChild(btn);
      });
    }

    /* ── Toggle extended learning ── */
    function toggleLearn(id, btn) {
      const el = document.getElementById('learn-' + id);
      el.classList.toggle('open');
      btn.classList.toggle('open');
    }

    /* ── Filter by tag ── */
    let activeTag = null;
    function filterByTag(tag, btn) {
      const cards = document.querySelectorAll('.reel-card');
      const btns = document.querySelectorAll('.filter-btn');

      if (activeTag === tag) {
        activeTag = null;
        btns.forEach(b => b.classList.remove('active'));
        cards.forEach(c => c.style.display = '');
        return;
      }

      activeTag = tag;
      btns.forEach(b => b.classList.toggle('active', b.textContent === tag));
      cards.forEach(c => {
        const tags = c.dataset.tags.split(',');
        c.style.display = tags.includes(tag) ? '' : 'none';
      });
    }

    /* ── Scroll progress ── */
    window.addEventListener('scroll', () => {
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      document.getElementById('progress').style.width = pct + '%';
    });

    loadReels();
  </script>

</body>
</html>
